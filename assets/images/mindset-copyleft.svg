<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background:#2a4858">
  <defs>
    <filter id="rough" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.04" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <linearGradient id="tank" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#40a8c8"/>
      <stop offset="100%" stop-color="#206878"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Room background -->
  <rect width="800" height="600" fill="#2a4858"/>

  <!-- Window in background -->
  <g transform="translate(600,80)">
    <rect width="160" height="200" rx="5" fill="#5088a0" stroke="#1a3848" stroke-width="3"/>
    <line x1="80" y1="0" x2="80" y2="200" stroke="#1a3848" stroke-width="2"/>
    <line x1="0" y1="100" x2="160" y2="100" stroke="#1a3848" stroke-width="2"/>
    <!-- City through window -->
    <rect x="20" y="55" width="15" height="42" fill="#3a6878" rx="1"/>
    <rect x="45" y="40" width="12" height="57" fill="#3a6878" rx="1"/>
    <rect x="100" y="50" width="18" height="47" fill="#3a6878" rx="1"/>
    <rect x="130" y="60" width="12" height="37" fill="#3a6878" rx="1"/>
  </g>

  <!-- Fish tank -->
  <g transform="translate(100,120)" filter="url(#rough)">
    <!-- Tank body -->
    <rect width="450" height="350" rx="8" fill="url(#tank)" stroke="#1a3848" stroke-width="4"/>
    <!-- Glass reflection -->
    <rect x="5" y="5" width="440" height="340" rx="6" fill="url(#glass)"/>
    <!-- Glass highlight -->
    <line x1="20" y1="30" x2="20" y2="300" stroke="white" stroke-width="2" opacity="0.1"/>

    <!-- Gravel bottom -->
    <path d="M5,310 Q100,300 225,315 Q350,320 445,305 L445,345 L5,345 Z" fill="#607858" opacity="0.6"/>
    <g fill="#506848" opacity="0.5">
      <circle cx="50" cy="325" r="4"/><circle cx="80" cy="330" r="3"/>
      <circle cx="120" cy="322" r="5"/><circle cx="170" cy="328" r="3"/>
      <circle cx="220" cy="320" r="4"/><circle cx="280" cy="326" r="5"/>
      <circle cx="340" cy="322" r="3"/><circle cx="390" cy="330" r="4"/>
    </g>

    <!-- Tank plant -->
    <path d="M380,310 Q375,270 385,240 Q390,220 380,200" stroke="#40a060" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M395,310 Q400,280 390,255 Q385,235 395,215" stroke="#48a858" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Treasure chest decoration -->
    <g transform="translate(80,295)">
      <rect x="-15" y="-12" width="30" height="20" rx="3" fill="#8b6530" stroke="#604020" stroke-width="2"/>
      <path d="M-15,-12 Q0,-22 15,-12" fill="#a07838" stroke="#604020" stroke-width="2"/>
      <rect x="-3" y="-8" width="6" height="6" rx="1" fill="#d0a030"/>
    </g>

    <!-- Bubbler -->
    <g>
      <rect x="200" y="305" width="12" height="15" rx="3" fill="#808080" opacity="0.5"/>
      <circle cx="206" cy="290" r="3" fill="none" stroke="#80c0d0" stroke-width="1" opacity="0.4"/>
      <circle cx="208" cy="275" r="2.5" fill="none" stroke="#80c0d0" stroke-width="1" opacity="0.3"/>
      <circle cx="204" cy="260" r="2" fill="none" stroke="#80c0d0" stroke-width="1" opacity="0.2"/>
    </g>

    <!-- Moorish idol fish (like Gill - black, white, yellow) -->
    <g transform="translate(300,200) rotate(5)">
      <ellipse rx="22" ry="30" fill="white" stroke="#303030" stroke-width="2"/>
      <!-- Black stripe -->
      <path d="M-8,-30 Q-5,0 -8,30" stroke="#202020" stroke-width="8" opacity="0.8"/>
      <!-- Yellow accent -->
      <path d="M8,-28 Q12,0 8,28" stroke="#e0c030" stroke-width="6" opacity="0.7"/>
      <!-- Long dorsal fin -->
      <path d="M0,-30 Q-5,-55 -15,-65 Q-10,-45 -2,-30" fill="white" stroke="#303030" stroke-width="1.5"/>
      <!-- Eye -->
      <circle cx="10" cy="-5" r="4" fill="white" stroke="#303030" stroke-width="1"/>
      <circle cx="11" cy="-5" r="2" fill="#303030"/>
      <!-- Snout -->
      <path d="M22,-5 Q28,-3 25,0" stroke="#303030" stroke-width="1.5" fill="none"/>
    </g>

    <!-- Small clownfish -->
    <g transform="translate(180,230) rotate(-5)">
      <ellipse rx="14" ry="9" fill="#f08030" stroke="#b06020" stroke-width="1.8"/>
      <path d="M-4,-9 Q-3,0 -4,9" stroke="white" stroke-width="3" opacity="0.85"/>
      <path d="M5,-9 Q6,0 5,9" stroke="white" stroke-width="3" opacity="0.85"/>
      <circle cx="8" cy="-2" r="3" fill="white"/>
      <circle cx="9" cy="-2" r="1.5" fill="#302010"/>
      <path d="M-14,0 Q-20,-5 -18,-8 M-14,0 Q-20,5 -18,8" stroke="#f08030" stroke-width="1.5" fill="#f09050"/>
    </g>

    <!-- Starfish on glass -->
    <g transform="translate(420,250) rotate(15)">
      <path d="M0,-15 L4,-5 L14,-5 L6,2 L9,12 L0,6 L-9,12 L-6,2 L-14,-5 L-4,-5 Z" fill="#d06848" stroke="#a04830" stroke-width="1.5"/>
    </g>

    <!-- Yellow tang -->
    <g transform="translate(120,170)">
      <ellipse rx="12" ry="10" fill="#e8d040" stroke="#b0a020" stroke-width="1.5"/>
      <circle cx="6" cy="-2" r="2" fill="white"/>
      <circle cx="7" cy="-2" r="1" fill="#404020"/>
      <path d="M-12,0 Q-16,-4 -15,-7 M-12,0 Q-16,4 -15,7" stroke="#e8d040" stroke-width="1.5" fill="#e8d848"/>
    </g>

    <!-- Pufferfish -->
    <g transform="translate(350,280)">
      <circle r="10" fill="#90b878" stroke="#607848" stroke-width="1.5"/>
      <circle cx="4" cy="-3" r="2.5" fill="white"/>
      <circle cx="5" cy="-3" r="1.2" fill="#304020"/>
      <path d="M8,2 Q10,3 9,4" stroke="#607848" stroke-width="1" fill="none"/>
    </g>
  </g>

  <!-- Tank stand -->
  <rect x="95" y="470" width="460" height="20" rx="3" fill="#1a3040" stroke="#0d2030" stroke-width="2"/>
  <rect x="110" y="490" width="20" height="80" fill="#1a3040"/>
  <rect x="520" y="490" width="20" height="80" fill="#1a3040"/>
</svg>
