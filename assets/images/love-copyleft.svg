<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" style="background:#1a5a6a">
  <defs>
    <filter id="rough" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.04" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a8898"/>
      <stop offset="50%" stop-color="#1a5a6a"/>
      <stop offset="100%" stop-color="#0d3545"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Water -->
  <rect width="800" height="450" fill="url(#water)"/>

  <!-- Warm light rays -->
  <g opacity="0.1">
    <polygon points="350,0 420,0 450,450 300,450" fill="#f0d080"/>
    <polygon points="450,0 500,0 520,450 400,450" fill="#f0d080"/>
  </g>

  <!-- Coral reef background -->
  <g filter="url(#rough)" opacity="0.6">
    <!-- Left coral cluster -->
    <path d="M0,340 Q30,300 20,260 Q15,240 25,220" stroke="#d06080" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M20,260 Q40,250 50,230" stroke="#d06080" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="25" cy="218" r="8" fill="#e080a0" opacity="0.7"/>
    <circle cx="50" cy="228" r="6" fill="#e080a0" opacity="0.7"/>

    <!-- Left seaweed -->
    <path d="M60,380 Q55,340 65,300 Q70,270 60,240" stroke="#40a060" stroke-width="5" fill="none" stroke-linecap="round"/>

    <!-- Right coral -->
    <path d="M800,360 Q770,320 780,280 Q785,260 775,240" stroke="#c85878" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M780,280 Q760,270 750,250" stroke="#c85878" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="775" cy="238" r="7" fill="#d870a0" opacity="0.7"/>
    <circle cx="750" cy="248" r="5" fill="#d870a0" opacity="0.7"/>

    <!-- Right seaweed -->
    <path d="M730,380 Q735,340 725,310 Q720,280 730,255" stroke="#48a858" stroke-width="5" fill="none" stroke-linecap="round"/>

    <!-- Bottom coral -->
    <path d="M250,420 Q260,390 255,365" stroke="#b85070" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M550,425 Q545,400 555,380" stroke="#b85070" stroke-width="4" fill="none" stroke-linecap="round"/>
    <ellipse cx="400" cy="430" rx="60" ry="15" fill="#805898" opacity="0.4"/>
  </g>

  <!-- Sea anemone (home) -->
  <g transform="translate(400,380)" filter="url(#rough)">
    <ellipse rx="80" ry="25" fill="#c05878" opacity="0.5"/>
    <g stroke-linecap="round" fill="none" stroke-width="3">
      <path d="M-60,0 Q-65,-30 -55,-55" stroke="#e87898"/>
      <path d="M-45,0 Q-50,-35 -40,-60" stroke="#e08090"/>
      <path d="M-30,0 Q-32,-40 -25,-65" stroke="#e87898"/>
      <path d="M-15,0 Q-18,-38 -10,-62" stroke="#e08090"/>
      <path d="M0,0 Q-2,-42 5,-68" stroke="#e87898"/>
      <path d="M15,0 Q12,-38 20,-62" stroke="#e08090"/>
      <path d="M30,0 Q28,-40 35,-65" stroke="#e87898"/>
      <path d="M45,0 Q42,-35 50,-58" stroke="#e08090"/>
      <path d="M60,0 Q58,-30 65,-52" stroke="#e87898"/>
    </g>
  </g>

  <!-- Parent clownfish (larger, left) -->
  <g transform="translate(340,290) rotate(-10)" filter="url(#rough)">
    <!-- Body -->
    <ellipse rx="35" ry="22" fill="#f08030" stroke="#b06020" stroke-width="2.5"/>
    <!-- White stripes -->
    <path d="M-12,-22 Q-10,0 -12,22" stroke="white" stroke-width="5" opacity="0.85" stroke-linecap="round"/>
    <path d="M10,-22 Q12,0 10,22" stroke="white" stroke-width="5" opacity="0.85" stroke-linecap="round"/>
    <!-- Eye -->
    <circle cx="20" cy="-5" r="6" fill="white"/>
    <circle cx="22" cy="-5" r="3" fill="#302010"/>
    <circle cx="23" cy="-6" r="1" fill="white"/>
    <!-- Mouth -->
    <path d="M30,3 Q34,6 32,8" stroke="#904020" stroke-width="1.5" fill="none"/>
    <!-- Fins -->
    <path d="M0,-22 Q5,-35 10,-22" fill="#f09048" stroke="#c06820" stroke-width="1.5"/>
    <path d="M-35,0 Q-48,-10 -45,-18 M-35,0 Q-48,10 -45,18" stroke="#f08030" stroke-width="2.5" fill="#f09050"/>
    <!-- Pectoral fin -->
    <path d="M10,12 Q15,22 8,20" fill="#f09048" stroke="#c06820" stroke-width="1.5"/>
  </g>

  <!-- Child clownfish (smaller, right, slightly below) -->
  <g transform="translate(460,305) rotate(5)" filter="url(#rough)">
    <!-- Body -->
    <ellipse rx="20" ry="13" fill="#f09040" stroke="#c06820" stroke-width="2"/>
    <!-- White stripes -->
    <path d="M-6,-13 Q-5,0 -6,13" stroke="white" stroke-width="3.5" opacity="0.85" stroke-linecap="round"/>
    <path d="M6,-13 Q7,0 6,13" stroke="white" stroke-width="3.5" opacity="0.85" stroke-linecap="round"/>
    <!-- Eye (bigger relative to body = cuter) -->
    <circle cx="10" cy="-3" r="4.5" fill="white"/>
    <circle cx="11.5" cy="-3" r="2.5" fill="#302010"/>
    <circle cx="12.5" cy="-4" r="0.8" fill="white"/>
    <!-- Mouth (smile) -->
    <path d="M16,2 Q19,5 17,6" stroke="#904020" stroke-width="1.2" fill="none"/>
    <!-- Fins -->
    <path d="M0,-13 Q3,-21 6,-13" fill="#f0a058" stroke="#c07028" stroke-width="1.2"/>
    <path d="M-20,0 Q-28,-6 -26,-10 M-20,0 Q-28,6 -26,10" stroke="#f09040" stroke-width="2" fill="#f0a058"/>
    <!-- Lucky fin (one smaller) -->
    <path d="M6,8 Q8,14 4,12" fill="#f0a058" stroke="#c07028" stroke-width="1"/>
  </g>

  <!-- Connection feeling - small hearts/bubbles between them -->
  <g opacity="0.4" filter="url(#glow)">
    <circle cx="400" cy="280" r="3" fill="#f0a060"/>
    <circle cx="395" cy="270" r="2" fill="#f0a060"/>
    <circle cx="405" cy="265" r="2.5" fill="#f0a060"/>
  </g>

  <!-- Bubbles -->
  <g opacity="0.25">
    <circle cx="300" cy="240" r="5" fill="none" stroke="#90c8d8" stroke-width="1.2"/>
    <circle cx="310" cy="220" r="3" fill="none" stroke="#90c8d8" stroke-width="1"/>
    <circle cx="480" cy="250" r="4" fill="none" stroke="#90c8d8" stroke-width="1"/>
    <circle cx="490" cy="235" r="3" fill="none" stroke="#90c8d8" stroke-width="1"/>
  </g>

  <!-- Sand bottom -->
  <path d="M0,420 Q100,410 200,418 Q300,425 400,415 Q500,408 600,418 Q700,425 800,415 L800,450 L0,450 Z" fill="#b09860" opacity="0.5" filter="url(#rough)"/>
</svg>
