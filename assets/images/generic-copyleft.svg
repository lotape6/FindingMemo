<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" style="background:#1a6b8a">
  <defs>
    <filter id="rough" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.04" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4db8d1"/>
      <stop offset="30%" stop-color="#2a8fa8"/>
      <stop offset="60%" stop-color="#1a6b8a"/>
      <stop offset="100%" stop-color="#0d3d52"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c2a66b"/>
      <stop offset="100%" stop-color="#8b7340"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Water background -->
  <rect width="800" height="450" fill="url(#water)"/>

  <!-- Light rays from surface -->
  <g opacity="0.12">
    <polygon points="200,0 260,0 340,450 220,450" fill="#80d4e8"/>
    <polygon points="400,0 440,0 500,450 380,450" fill="#80d4e8"/>
    <polygon points="580,0 630,0 680,450 540,450" fill="#80d4e8"/>
  </g>

  <!-- Surface waves -->
  <path d="M0,15 Q50,5 100,18 Q150,30 200,12 Q250,0 300,16 Q350,28 400,10 Q450,0 500,15 Q550,28 600,12 Q650,2 700,18 Q750,30 800,14" fill="none" stroke="#80d4e8" stroke-width="2" opacity="0.3" filter="url(#rough)"/>

  <!-- Distant city silhouette (generic) -->
  <g opacity="0.15" fill="#2a5060">
    <rect x="100" y="0" width="30" height="35" rx="2"/>
    <rect x="140" y="5" width="25" height="30" rx="2"/>
    <rect x="175" y="0" width="20" height="38" rx="2"/>
    <rect x="205" y="8" width="35" height="27" rx="2"/>
    <rect x="500" y="3" width="28" height="32" rx="2"/>
    <rect x="540" y="0" width="22" height="38" rx="2"/>
    <rect x="575" y="6" width="30" height="29" rx="2"/>
    <rect x="615" y="2" width="25" height="33" rx="2"/>
  </g>

  <!-- Sandy bottom -->
  <path d="M0,410 Q100,395 200,405 Q300,415 400,400 Q500,390 600,405 Q700,415 800,400 L800,450 L0,450 Z" fill="url(#sand)" filter="url(#rough)"/>

  <!-- Coral formations (left) -->
  <g filter="url(#rough)">
    <path d="M60,380 Q65,340 50,310 Q45,290 55,275 M50,310 Q70,300 80,280 M55,340 Q40,330 30,310" stroke="#e87090" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="55" cy="272" r="6" fill="#f090a8" opacity="0.8"/>
    <circle cx="80" cy="278" r="5" fill="#f090a8" opacity="0.8"/>
    <circle cx="30" cy="308" r="5" fill="#f090a8" opacity="0.8"/>
    <path d="M120,410 Q115,370 125,340 Q130,310 120,285 Q115,270 120,255" stroke="#40a860" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M135,410 Q140,380 130,355 Q125,330 135,305" stroke="#50b870" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Coral formations (right) -->
  <g filter="url(#rough)">
    <path d="M700,400 Q695,360 710,330 Q720,310 705,290 M710,330 Q730,320 740,300 M705,360 Q680,350 670,330" stroke="#d06880" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="705" cy="288" r="6" fill="#e880a0" opacity="0.8"/>
    <circle cx="740" cy="298" r="5" fill="#e880a0" opacity="0.8"/>
    <path d="M750,405 Q755,370 745,340 Q740,320 750,300" stroke="#48b068" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Purple brain coral (center bottom) -->
  <ellipse cx="400" cy="408" rx="45" ry="22" fill="#8060a0" opacity="0.6" filter="url(#rough)"/>
  <path d="M365,405 Q380,395 400,408 Q420,395 435,405" stroke="#9878b0" stroke-width="2" fill="none"/>
  <path d="M370,412 Q385,402 400,412 Q415,402 430,412" stroke="#9878b0" stroke-width="2" fill="none"/>

  <!-- ===== MARLIN — big, determined clownfish, center of the scene ===== -->
  <g transform="translate(380,210) rotate(-8)" filter="url(#rough)">
    <!-- Body -->
    <ellipse rx="52" ry="34" fill="#f08030" stroke="#b05818" stroke-width="3"/>
    <!-- White stripes with black edges -->
    <path d="M-16,-34 Q-14,0 -16,34" stroke="#1a1a1a" stroke-width="8" opacity="0.3" stroke-linecap="round"/>
    <path d="M-16,-34 Q-14,0 -16,34" stroke="white" stroke-width="6" opacity="0.9" stroke-linecap="round"/>
    <path d="M14,-34 Q16,0 14,34" stroke="#1a1a1a" stroke-width="8" opacity="0.3" stroke-linecap="round"/>
    <path d="M14,-34 Q16,0 14,34" stroke="white" stroke-width="6" opacity="0.9" stroke-linecap="round"/>
    <!-- Dorsal fin -->
    <path d="M-5,-34 Q0,-52 12,-34" fill="#f09040" stroke="#b05818" stroke-width="2"/>
    <!-- Tail fin -->
    <path d="M-52,0 Q-72,-16 -68,-25 M-52,0 Q-72,16 -68,25" stroke="#f08030" stroke-width="4" fill="#f09848" stroke-linecap="round"/>
    <path d="M-68,-25 Q-60,-12 -52,0 Q-60,12 -68,25" fill="#f09848" stroke="#c06020" stroke-width="2"/>
    <!-- Pectoral fin (bottom) -->
    <path d="M15,18 Q22,32 12,30" fill="#f09848" stroke="#c06820" stroke-width="2"/>
    <!-- Eye (large, determined) -->
    <circle cx="28" cy="-8" r="10" fill="white" stroke="#904020" stroke-width="1"/>
    <circle cx="31" cy="-8" r="5.5" fill="#302010"/>
    <circle cx="33" cy="-10" r="1.8" fill="white"/>
    <!-- Eyebrow (determination) -->
    <path d="M20,-18 Q28,-22 36,-18" stroke="#904020" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Mouth (set, resolute) -->
    <path d="M42,2 Q48,4 46,7" stroke="#803018" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Motion lines behind Marlin (showing speed/determination) -->
  <g stroke="#80c8e0" stroke-width="1.5" opacity="0.2" stroke-linecap="round" filter="url(#rough)">
    <line x1="250" y1="195" x2="300" y2="198"/>
    <line x1="240" y1="215" x2="295" y2="215"/>
    <line x1="255" y1="235" x2="305" y2="232"/>
    <line x1="245" y1="180" x2="280" y2="182"/>
    <line x1="260" y1="248" x2="290" y2="245"/>
  </g>

  <!-- Small fish school (background, swimming away) -->
  <g opacity="0.45">
    <g transform="translate(600,140)" filter="url(#rough)">
      <ellipse rx="6" ry="4" fill="#80c0e0"/><path d="M-6,0 L-10,-3 M-6,0 L-10,3" stroke="#80c0e0" stroke-width="1.5"/>
    </g>
    <g transform="translate(620,130)" filter="url(#rough)">
      <ellipse rx="5" ry="3" fill="#80c0e0"/><path d="M-5,0 L-8,-2 M-5,0 L-8,2" stroke="#80c0e0" stroke-width="1.5"/>
    </g>
    <g transform="translate(610,150)" filter="url(#rough)">
      <ellipse rx="5" ry="3" fill="#80c0e0"/><path d="M-5,0 L-8,-2 M-5,0 L-8,2" stroke="#80c0e0" stroke-width="1.5"/>
    </g>
    <g transform="translate(640,138)" filter="url(#rough)">
      <ellipse rx="4" ry="3" fill="#80c0e0"/><path d="M-4,0 L-7,-2 M-4,0 L-7,2" stroke="#80c0e0" stroke-width="1.5"/>
    </g>
  </g>

  <!-- Sea turtle (background, distant) -->
  <g transform="translate(620,280) scale(0.6)" opacity="0.5" filter="url(#rough)">
    <ellipse rx="28" ry="20" fill="#608050" stroke="#405030" stroke-width="2"/>
    <path d="M-10,-8 L-5,-3 L0,-8 L5,-3 L10,-8" stroke="#506840" stroke-width="1.5" fill="none"/>
    <ellipse cx="32" cy="0" rx="9" ry="5" fill="#709060" stroke="#405030" stroke-width="1.5"/>
    <circle cx="37" cy="-2" r="2" fill="#203020"/>
    <path d="M-14,-16 Q-22,-22 -18,-13" fill="#709060" stroke="#405030" stroke-width="1.5"/>
    <path d="M14,-16 Q22,-22 18,-13" fill="#709060" stroke="#405030" stroke-width="1.5"/>
    <path d="M-14,16 Q-22,22 -18,13" fill="#709060" stroke="#405030" stroke-width="1.5"/>
    <path d="M14,16 Q22,22 18,13" fill="#709060" stroke="#405030" stroke-width="1.5"/>
  </g>

  <!-- Jellyfish (far background) -->
  <g transform="translate(180,320)" opacity="0.35" filter="url(#rough)">
    <ellipse rx="10" ry="7" fill="#c080d0" opacity="0.6"/>
    <path d="M-6,5 Q-8,18 -4,26" stroke="#c080d0" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M0,7 Q2,20 -1,28" stroke="#c080d0" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M6,5 Q8,18 4,24" stroke="#c080d0" stroke-width="1.5" fill="none" opacity="0.5"/>
  </g>

  <!-- Blue tang fish (background companion, smaller) -->
  <g transform="translate(480,250) rotate(-5)" filter="url(#rough)" opacity="0.6">
    <ellipse rx="14" ry="10" fill="#3080d0" stroke="#2060a0" stroke-width="2"/>
    <path d="M-3,-7 Q7,0 -3,7" stroke="#1050a0" stroke-width="2" fill="none"/>
    <circle cx="7" cy="-2" r="2.2" fill="white"/>
    <circle cx="8" cy="-2" r="1.1" fill="#102040"/>
    <path d="M-14,0 Q-20,-5 -18,-8 M-14,0 Q-20,5 -18,8" stroke="#3080d0" stroke-width="1.5" fill="#4090d8" stroke-linecap="round"/>
  </g>

  <!-- Bubbles from Marlin -->
  <g opacity="0.3" filter="url(#glow)">
    <circle cx="420" cy="170" r="5" fill="none" stroke="#a0d8e8" stroke-width="1.2"/>
    <circle cx="430" cy="155" r="3.5" fill="none" stroke="#a0d8e8" stroke-width="1"/>
    <circle cx="415" cy="145" r="2.5" fill="none" stroke="#a0d8e8" stroke-width="1"/>
    <circle cx="435" cy="138" r="2" fill="none" stroke="#a0d8e8" stroke-width="0.8"/>
  </g>

  <!-- More ambient bubbles -->
  <g opacity="0.2">
    <circle cx="150" cy="200" r="4" fill="none" stroke="#a0d8e8" stroke-width="1"/>
    <circle cx="650" cy="180" r="3" fill="none" stroke="#a0d8e8" stroke-width="1"/>
    <circle cx="550" cy="350" r="3" fill="none" stroke="#a0d8e8" stroke-width="1"/>
  </g>
</svg>
