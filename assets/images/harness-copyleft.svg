<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" style="background:#1070a0">
  <defs>
    <filter id="rough" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.04" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#40b8e0"/>
      <stop offset="40%" stop-color="#2090c0"/>
      <stop offset="100%" stop-color="#105880"/>
    </linearGradient>
    <linearGradient id="current" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60d0f0" stop-opacity="0"/>
      <stop offset="30%" stop-color="#60d0f0" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#60d0f0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#60d0f0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Water -->
  <rect width="800" height="450" fill="url(#water)"/>

  <!-- Light rays -->
  <g opacity="0.12">
    <polygon points="100,0 160,0 250,450 80,450" fill="#90e0f0"/>
    <polygon points="300,0 350,0 420,450 260,450" fill="#90e0f0"/>
    <polygon points="550,0 600,0 650,450 500,450" fill="#90e0f0"/>
  </g>

  <!-- Current flow lines (EAC - the highway) -->
  <g opacity="0.2" stroke="#80e0ff" fill="none" stroke-width="3" stroke-linecap="round">
    <path d="M0,140 Q200,120 400,150 Q600,180 800,160"/>
    <path d="M0,180 Q200,160 400,190 Q600,220 800,200"/>
    <path d="M0,220 Q200,200 400,230 Q600,260 800,240"/>
    <path d="M0,260 Q200,240 400,270 Q600,300 800,280"/>
    <path d="M0,300 Q200,280 400,310 Q600,340 800,320"/>
  </g>

  <!-- Current band (glowing) -->
  <rect x="0" y="150" width="800" height="160" fill="url(#current)"/>

  <!-- Speed lines in the current -->
  <g stroke="#80e0ff" stroke-width="1.5" opacity="0.25" stroke-linecap="round">
    <line x1="50" y1="200" x2="130" y2="195"/>
    <line x1="180" y1="230" x2="250" y2="225"/>
    <line x1="320" y1="210" x2="400" y2="208"/>
    <line x1="450" y1="240" x2="540" y2="235"/>
    <line x1="580" y1="215" x2="670" y2="212"/>
    <line x1="700" y1="250" x2="780" y2="247"/>
    <line x1="100" y1="270" x2="180" y2="268"/>
    <line x1="350" y1="280" x2="430" y2="276"/>
    <line x1="550" y1="190" x2="620" y2="186"/>
  </g>

  <!-- Big sea turtle (Crush - center, riding the current) -->
  <g transform="translate(380,220) rotate(-5)" filter="url(#rough)">
    <!-- Shell -->
    <ellipse rx="65" ry="45" fill="#608848" stroke="#405828" stroke-width="3"/>
    <!-- Shell pattern -->
    <path d="M-30,-20 L-15,-10 L0,-25 L15,-10 L30,-20" stroke="#506838" stroke-width="2" fill="none"/>
    <path d="M-35,0 L-18,8 L0,-5 L18,8 L35,0" stroke="#506838" stroke-width="2" fill="none"/>
    <path d="M-30,20 L-15,12 L0,25 L15,12 L30,20" stroke="#506838" stroke-width="2" fill="none"/>
    <!-- Head -->
    <ellipse cx="72" cy="0" rx="20" ry="14" fill="#78a058" stroke="#405828" stroke-width="2.5"/>
    <!-- Eye -->
    <circle cx="82" cy="-5" r="5" fill="white"/>
    <circle cx="84" cy="-5" r="2.5" fill="#203020"/>
    <circle cx="85" cy="-6" r="0.8" fill="white"/>
    <!-- Chill smile -->
    <path d="M85,4 Q92,8 88,10" stroke="#405828" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Front flippers -->
    <path d="M-30,-40 Q-55,-60 -70,-45 Q-60,-35 -40,-35" fill="#78a058" stroke="#405828" stroke-width="2"/>
    <path d="M-30,40 Q-55,60 -70,45 Q-60,35 -40,35" fill="#78a058" stroke="#405828" stroke-width="2"/>
    <!-- Back flippers -->
    <path d="M50,-35 Q65,-55 80,-42 Q70,-32 55,-30" fill="#78a058" stroke="#405828" stroke-width="2"/>
    <path d="M50,35 Q65,55 80,42 Q70,32 55,30" fill="#78a058" stroke="#405828" stroke-width="2"/>
  </g>

  <!-- Small clownfish riding on turtle's back -->
  <g transform="translate(360,185) rotate(-8)" filter="url(#rough)">
    <ellipse rx="14" ry="9" fill="#f08030" stroke="#b06020" stroke-width="1.8"/>
    <path d="M-4,-9 Q-3,0 -4,9" stroke="white" stroke-width="3" opacity="0.85"/>
    <path d="M5,-9 Q6,0 5,9" stroke="white" stroke-width="3" opacity="0.85"/>
    <circle cx="8" cy="-2" r="3" fill="white"/>
    <circle cx="9" cy="-2" r="1.5" fill="#302010"/>
    <path d="M-14,0 Q-20,-5 -18,-8 M-14,0 Q-20,5 -18,8" stroke="#f08030" stroke-width="1.5" fill="#f09050"/>
  </g>

  <!-- Blue tang on the side -->
  <g transform="translate(300,205) rotate(-3)" filter="url(#rough)">
    <ellipse rx="13" ry="9" fill="#3080d0" stroke="#2060a0" stroke-width="1.8"/>
    <path d="M-3,-6 Q6,0 -3,6" stroke="#1050a0" stroke-width="2" fill="none"/>
    <circle cx="7" cy="-2" r="2.5" fill="white"/>
    <circle cx="8" cy="-2" r="1.2" fill="#102040"/>
    <path d="M-13,0 Q-19,-4 -17,-7 M-13,0 Q-19,4 -17,7" stroke="#3080d0" stroke-width="1.5" fill="#4090d8"/>
  </g>

  <!-- Baby turtles in the current -->
  <g filter="url(#rough)" opacity="0.7">
    <g transform="translate(200,260) rotate(-5) scale(0.5)">
      <ellipse rx="25" ry="18" fill="#608848" stroke="#405828" stroke-width="2.5"/>
      <ellipse cx="30" cy="0" rx="10" ry="7" fill="#78a058" stroke="#405828" stroke-width="2"/>
      <circle cx="35" cy="-3" r="2.5" fill="#203020"/>
      <path d="M-12,-15 Q-22,-22 -28,-15" fill="#78a058" stroke="#405828" stroke-width="1.5"/>
      <path d="M-12,15 Q-22,22 -28,15" fill="#78a058" stroke="#405828" stroke-width="1.5"/>
    </g>
    <g transform="translate(560,260) rotate(3) scale(0.5)">
      <ellipse rx="25" ry="18" fill="#608848" stroke="#405828" stroke-width="2.5"/>
      <ellipse cx="30" cy="0" rx="10" ry="7" fill="#78a058" stroke="#405828" stroke-width="2"/>
      <circle cx="35" cy="-3" r="2.5" fill="#203020"/>
      <path d="M-12,-15 Q-22,-22 -28,-15" fill="#78a058" stroke="#405828" stroke-width="1.5"/>
      <path d="M-12,15 Q-22,22 -28,15" fill="#78a058" stroke="#405828" stroke-width="1.5"/>
    </g>
    <g transform="translate(150,230) rotate(-8) scale(0.4)">
      <ellipse rx="25" ry="18" fill="#608848" stroke="#405828" stroke-width="2.5"/>
      <ellipse cx="30" cy="0" rx="10" ry="7" fill="#78a058" stroke="#405828" stroke-width="2"/>
      <circle cx="35" cy="-3" r="2.5" fill="#203020"/>
    </g>
  </g>

  <!-- "Righteous!" speech bubble (sketch style) -->
  <g transform="translate(480,140)" filter="url(#rough)">
    <path d="M-50,-25 Q-50,-35 -35,-35 L35,-35 Q50,-35 50,-25 L50,5 Q50,15 35,15 L10,15 L0,30 L-5,15 L-35,15 Q-50,15 -50,5 Z" fill="white" fill-opacity="0.85" stroke="#405828" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" font-family="'Comic Sans MS','Segoe Print',cursive" font-size="14" fill="#405828">Righteous!</text>
  </g>

  <!-- Bubbles -->
  <g opacity="0.3">
    <circle cx="420" cy="165" r="4" fill="none" stroke="#a0e0f0" stroke-width="1.2"/>
    <circle cx="430" cy="150" r="3" fill="none" stroke="#a0e0f0" stroke-width="1"/>
    <circle cx="250" cy="190" r="3" fill="none" stroke="#a0e0f0" stroke-width="1"/>
    <circle cx="600" cy="200" r="4" fill="none" stroke="#a0e0f0" stroke-width="1"/>
  </g>

  <!-- Bottom hints -->
  <path d="M0,420 Q200,410 400,425 Q600,435 800,420 L800,450 L0,450 Z" fill="#0d3545" opacity="0.5"/>
</svg>
